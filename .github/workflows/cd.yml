name: CD Pipeline

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
          cache: true

      - name: Run tests
        run: make test

  release:
    name: Create Release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
          cache: true

      - name: Build for Linux
        env:
          GOOS: linux
          GOARCH: amd64
        run: go build -v -o dist/goperf-linux-amd64 .

      - name: Build for Windows
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -v -o dist/goperf-windows-amd64.exe .

      - name: Build for Darwin
        env:
          GOOS: darwin
          GOARCH: amd64
        run: go build -v -o dist/goperf-darwin-amd64 .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/goperf-linux-amd64
            dist/goperf-windows-amd64.exe
            dist/goperf-darwin-amd64
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
